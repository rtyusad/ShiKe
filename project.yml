name: ShiKe
options:
  bundleIdPrefix: com.shike
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  ShiKe:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Core
      - path: Models
      - path: Resources
      - path: Services
      - path: ViewModels
      - path: Views
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shike.ios
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: 食刻
        INFOPLIST_KEY_CFBundleDisplayName: 食刻
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIRequiredDeviceCapabilities:
          - arm64
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.food-and-drink"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_CFBundleShortVersionString: "1.0"
        INFOPLIST_KEY_CFBundleVersion: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: "937UQ22LA8"
          PROVISIONING_PROFILE_SPECIFIER: ""
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          ONLY_ACTIVE_ARCH: YES
        Release:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: "937UQ22LA8"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
          SWIFT_COMPILATION_MODE: wholemodule
          SWIFT_OPTIMIZATION_LEVEL: "-O"
